{% extends "invitations/base.html" %}

{% block title %}Log in{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto mt-8">
    <h1 class="text-2xl font-semibold text-zinc-900 mb-1">Welcome back</h1>
    <p class="text-zinc-500 mb-6 text-sm">Log in to manage your parties and invitation links.</p>

    <div class="bg-white border border-zinc-200 rounded-xl p-6">
      <form method="post" class="form-prose">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit"
                class="w-full mt-2 inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg
                       bg-zinc-900 text-white text-sm font-medium hover:bg-zinc-800 transition focus-ring">
          Log in
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </form>
    </div>
  </div>
{% endblock %}
