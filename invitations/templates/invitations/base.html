<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Party Invitations{% endblock %}</title>
  <style>
    :root { --fg: #1a1a1a; --muted: #666; --accent: #7c3aed; --bg: #fafaf9; --card: #fff; --border: #e5e5e5; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--fg); background: var(--bg); }
    header { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    header a { color: var(--fg); text-decoration: none; font-weight: 600; }
    nav a { margin-left: 1rem; color: var(--muted); }
    main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
    h1, h2 { margin-top: 0; }
    form p { margin: 0.5rem 0; }
    label { display: block; font-size: 0.875rem; color: var(--muted); margin-bottom: 0.25rem; }
    input[type=text], input[type=email], input[type=tel], input[type=datetime-local], input[type=number], textarea, select {
      width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; font-size: 1rem;
    }
    .btn { display: inline-block; padding: 0.5rem 1rem; background: var(--accent); color: #fff; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.875rem; }
    .btn-secondary { background: #fff; color: var(--fg); border: 1px solid var(--border); }
    .btn-danger { background: #dc2626; }
    .messages { list-style: none; padding: 0; }
    .messages li { padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 0.5rem; background: #ecfdf5; color: #065f46; }
    .errorlist { color: #dc2626; font-size: 0.875rem; list-style: none; padding: 0; margin: 0.25rem 0; }
    .meta { color: var(--muted); font-size: 0.875rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid var(--border); }
  </style>
</head>
<body>
  <header>
    <a href="{% url 'party_list' %}">🎉 Party Invitations</a>
    <nav>
      {% if user.is_authenticated %}
        <a href="{% url 'party_list' %}">Parties</a>
        <a href="{% url 'palette_list' %}">Palettes</a>
        <span class="meta">{{ user.username }}</span>
        <form action="{% url 'logout' %}" method="post" style="display:inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-secondary">Log out</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">Log in</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}<li>{{ message }}</li>{% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
